import org.panteleyev.jpackage.ImageType
import org.panteleyev.jpackage.JPackageTask

// #region Common configuration and utilities

String BUILD_GROUP = "build"
String DISTRIBUTION_GROUP = "distribution"

// https://github.com/controlsfx/controlsfx/wiki/Using-ControlsFX-with-JDK-9-and-above
List<String> defaultJvmArgs = [
    '--enable-native-access=javafx.graphics',
    '--add-exports', 'javafx.base/com.sun.javafx.event=org.controlsfx.controls',
    '-Dapp.name=' + project.appName,
    '-Dapp.version=' + project.appVersion
]

Directory resourceDir = layout.projectDirectory.dir('src/main/resources')
resourceDir.asFile.mkdirs()

Directory compileDir = rootProject.layout.projectDirectory.dir('compiled')
compileDir.asFile.mkdirs()

// #endregion

// appName and appVersion are inherited from JPackageTask
String osArch = System.getProperty("os.arch")
String basename = appName.replace(" ", "") + "-" + appVersion + "-" + osArch

List<ImageType> types = PackagingUtils.getTypes()

Directory installerDir = compileDir.dir('installers')
Directory dest

types.each { t ->
    boolean isAppImage = (t == ImageType.APP_IMAGE)
    Directory appImgDest = installerDir.dir(project.appName)
    println "Configuring packaging task for ${t}"

    tasks.register("jpackage_$t", JPackageTask.class) {
        group = DISTRIBUTION_GROUP

        onlyIf { task ->
            if (PackagingUtils.isToolAvailableFor(t)) return true
            println "Skipping ${task.path}: required tool for ${t} is not available"
            return false
        }

        outputs.upToDateWhen { false }
        dependsOn tasks.named('readyAllJars')

        if (!isAppImage) dependsOn tasks.jpackage_APP_IMAGE

        type = t

        appDescription = project.appName
        appName = project.appName
        appVersion = project.appVersion
        copyright = '© ' + project.appVendor
        vendor = project.appVendor

        if (isAppImage) {
            dependsOn tasks.named('delAppImage')

            javaOptions = ['-Dfile.encoding=UTF-8'] + defaultJvmArgs
            module = 'password.manager.app/password.manager.app.App'
            modulePaths = files(layout.buildDirectory.dir('jars'))
            runtimeImage = file(System.getProperty('java.home'))
        } else {
            aboutUrl = 'https://github.com/Achille004/PasswordManager'
            appImage = compileDir.dir("appimage").asFile.toString()
            licenseFile = resourceDir.file('license.txt')
        }

        windows {
            dest = installerDir.dir('windows')
            icon =  resourceDir.file('icon.ico')

            winConsole = debugMode.toBoolean()

            if (!isAppImage) {
                dependsOn tasks.delWindowsInstallers

                winDirChooser = true
                winHelpUrl = 'https://github.com/Achille004/PasswordManager/issues'
                winMenu = true
                winMenuGroup = project.appVendor
                winShortcut = true
                winShortcutPrompt = true
            }
        }

        mac {
            dest = installerDir.dir('mac')
            icon =  resourceDir.file('icon.icns')

            if (!isAppImage) {
                dependsOn tasks.named('delMacInstallers')

                macAppCategory  = 'security'
                macAppStore = false
                macPackageName = project.appName
                macPackageIdentifier = (project.appName.replace(" ", "") + "-" + project.appVersion)
                macSigningKeyUserName = project.appVendor
            }
        }

        linux {
            dest = installerDir.dir('linux')
            icon =  resourceDir.file('icon.png')

            if (!isAppImage) {
                dependsOn tasks.named('delLinuxInstallers')

                linuxAppCategory = 'security'
                linuxDebMaintainer = '2004marras@gmail.com'
                linuxMenuGroup = project.appVendor
                linuxRpmLicenseType = 'GPLv3'
                linuxShortcut = true
            }
        }

        destination = isAppImage ? compileDir : dest

        // Rename the file to the desired format
        doLast {
            File outFile = destination.get().asFile.listFiles()
                    .find {
                        String toMatch = (isAppImage ? appImgDest.asFile.name : t.toString()).toLowerCase()
                        return it.name.toLowerCase().contains(toMatch)
                    }

            if (outFile == null) return

            String targetName
            if (isAppImage) {
                targetName = "appimage"
            } else {
                targetName = basename
                int dot  = outFile.name.lastIndexOf(".")
                if (dot >= 0) targetName += outFile.name.substring(dot)
            }

            File newFile = new File(outFile.parentFile, targetName)
            outFile.renameTo(newFile)
            outFile.delete()

            println "Renamed '${outFile.name}' to '${newFile.name}'"

            // Make sure the new file is writable (WiX was building read-only EXEs
            // but ok MSIs, and I'm not gonna dive into that rabbit hole right now)
            if (!newFile.canWrite()) {
                newFile.setWritable(true)
                println "  L Was read-only, removed attribute"
            }
        }
    }
}

tasks.register("assembleInstallers") {
    group = DISTRIBUTION_GROUP

    mkdir installerDir

    println "Packaging ${appName} ${appVersion}"

    println "Building candidates: ${types.join(', ')}"
    dependsOn types.collect { type -> tasks.named("jpackage_$type") }
}

tasks.register('dryAssembleInstallers') {
    group = DISTRIBUTION_GROUP

    System.setProperty("jpackage.dryRun", "true")
    finalizedBy tasks.assembleInstallers
}

///// CLEANUP TASKS /////

tasks.register("delAppImage", Delete) {
    group = BUILD_GROUP
    outputs.upToDateWhen { false }

    File appImageDir = compileDir.dir("appimage").asFile
    if (!appImageDir.exists()) return

    delete appImageDir
    println "Removed app image directory"
}

["windows", "mac", "linux"].each { platform ->
    tasks.register("del${platform.capitalize()}Installers", Delete) {
        group = BUILD_GROUP
        outputs.upToDateWhen { false }

        File platformDir = installerDir.dir(platform).asFile
        if (!platformDir.exists()) return

        delete platformDir.listFiles()
        println "Cleaned ${platform.capitalize()} directory"
    }
}